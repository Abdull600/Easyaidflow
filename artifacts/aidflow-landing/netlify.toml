[build]
  command   = "pnpm --filter @workspace/aidflow-landing... run build"
  publish   = "artifacts/aidflow-landing/dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "artifacts/aidflow-landing/netlify/functions"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
