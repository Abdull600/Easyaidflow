kind = "web"
previewPath = "/"
title = "AidFlow AI Landing Page"
version = "1.0.0"
id = "artifacts/aidflow-landing"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21785

[services.development]
run = "pnpm --filter @workspace/aidflow-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aidflow-landing", "run", "build" ]
serve = "static"
publicDir = "artifacts/aidflow-landing/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21785"
BASE_PATH = "/"
